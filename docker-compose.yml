services:
  postgres:
    image: postgres:16
    container_name: mnemo
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kronos-redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
